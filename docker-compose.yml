services:
  aicortex:
    build: .
    # To use a prebuilt image instead of building locally:
    # image: ghcr.io/ikarusmk/aicortex:latest
    container_name: aicortex
    restart: unless-stopped
    ports:
      - "${HOST_PORT:-8787}:8787"
    environment:
      TZ: "${TZ:-UTC}"
      PUID: "${PUID:-1000}"
      PGID: "${PGID:-1000}"
      PYTHONUNBUFFERED: "1"
      # Trust the reverse proxy's X-Forwarded-* headers so the server knows it is
      # served over HTTPS — otherwise issued OAuth tokens fail audience validation.
      # Default "*" is convenient on an isolated Docker network; for a tighter
      # setup scope it to your proxy's source IP/subnet (e.g. "172.18.0.0/16").
      FORWARDED_ALLOW_IPS: "${FORWARDED_ALLOW_IPS:-*}"
      # SSRF allow-list: internal/private IP ranges the dispatchers (call_service,
      # mqtt, ftp) may reach. EMPTY = block all private/link-local by default.
      # Set to the LAN and/or VPN subnets you actually use, e.g.
      # "192.168.1.0/24,100.64.0.0/10". Operator-only — the model can't change it.
      INTERNAL_ALLOW_CIDRS: "${INTERNAL_ALLOW_CIDRS:-}"
      # Safety opt-ins (leave unset for the secure defaults):
      #  ALLOW_INSECURE=1        → allow an open 0.0.0.0 bind when no OIDC is set
      #  ALLOW_PLAINTEXT_VAULT=1 → allow secret_set without STORAGE_ENCRYPTION_KEY
      ALLOW_INSECURE: "${ALLOW_INSECURE:-}"
      ALLOW_PLAINTEXT_VAULT: "${ALLOW_PLAINTEXT_VAULT:-}"
      # Optional static token for headless machine clients (the autonomy runner,
      # any LLM). When set, the connector accepts it ALONGSIDE OIDC (MultiAuth).
      # Generate: openssl rand -hex 32
      RUNNER_TOKEN: "${RUNNER_TOKEN:-}"
      MEMORY_DIR: /data/memory
      SKILLS_DIR: /data/skills
      SERVICES_DIR: /data/services
      VAULT_DIR: /data/vault
      WORK_DIR: /data/work
      MQTT_DIR: /data/mqtt
      FTP_DIR: /data/ftp
      MCP_DIR: /data/mcp
      COORD_DIR: /data/coordination
      CRON_DIR: /data/cron
      SESSIONS_DIR: /data/sessions
      # Sessions not updated within this many days are auto-pruned (0 = keep forever).
      SESSION_RETENTION_DAYS: "${SESSION_RETENTION_DAYS:-90}"
      PRINT_DIR: /data/printers
      SCAN_DIR: /data/scanners
      WEBDAV_DIR: /data/webdav
      SSH_DIR: /data/ssh
      MAIL_DIR: /data/mail
      SECRETS_DIR: /secrets
    # Optional: a fresh clone has only .env.example (real .env is git-ignored).
    # Marking it not-required lets `docker compose build`/`up` work out of the box;
    # every variable above already has a sensible default. Copy .env.example to
    # .env to override (OIDC, secrets, CIDRs, …).
    env_file:
      - path: .env
        required: false
    volumes:
      # HOT state on fast storage (SSD): small, latency-sensitive files the
      # assistant touches constantly — memory, skills, sessions, coordination,
      # all device/service configs, vault, auth. ONE mount: the app creates every
      # subfolder itself (incl. new ones like memory/candidates), so a new feature
      # needs NO compose change. Existing ./data/* are the same files, one level up.
      - ./data:/data
      # COLD/bulk file hub (scans, downloads, print sources): large and
      # throughput-bound, not latency-sensitive — the one thing worth putting on an
      # HDD. Defaults under ./data; set WORK_HOST_PATH to offload it, e.g.
      # WORK_HOST_PATH=/volume1/cold/aicortex-work
      - ${WORK_HOST_PATH:-./data/work}:/data/work
      - ./secrets:/secrets:ro   # kept separate: read-only secret boundary
      - ./logs:/logs            # already separate (append-heavy, HDD-friendly)
    healthcheck:
      test: ["CMD", "python", "-c", "import socket,sys; s=socket.socket(); s.settimeout(2); sys.exit(0 if s.connect_ex(('127.0.0.1',8787))==0 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
